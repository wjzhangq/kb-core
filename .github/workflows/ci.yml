name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm deps
        run: npm ci --ignore-scripts

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@3

      - name: Clippy
        run: cargo clippy --all-targets -- --deny warnings

      - name: Cargo test
        run: cargo test

      - name: Build debug native addon
        run: npm run build:debug

      - name: Vitest Node integration tests
        run: npx vitest run
        env:
          KB_SKIP_MODEL_DOWNLOAD: "1"
