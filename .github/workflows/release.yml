name: Release

# Compile + pack + create a GitHub Release ONLY on version tags.
# This job never publishes to npm — that is a separate, manually triggered
# workflow (publish-npm.yml) that pulls the .tgz files from the Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ---- Gate: lint + Rust tests once on Linux before we spend time on the matrix ----
  check:
    name: Clippy & cargo test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- --deny warnings
      - name: Cargo test
        run: cargo test

  # ---- Build native addon for each published target ----
  build:
    name: Build ${{ matrix.target }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-22.04
          # Temporarily disabled — aarch64-unknown-linux-gnu build turned off.
          # - target: aarch64-unknown-linux-gnu
          #   host: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@3

      - name: Install npm deps
        run: npm install --ignore-scripts

      # ort-download-binaries fetches ONNX Runtime at build time and links it
      # statically into the .node, so each artifact is self-contained.
      - name: Build release binary
        run: napi build --platform --release --target ${{ matrix.target }}

      - name: Node integration tests
        run: npx vitest run
        env:
          KB_SKIP_MODEL_DOWNLOAD: "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ---- Pack root + per-platform packages into .tgz and attach to a GitHub Release ----
  # No npm publish here. Publishing is done manually via publish-npm.yml, which
  # downloads these .tgz files. That lets npm publish be retried without recompiling.
  release:
    name: Pack & create GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@3

      - name: Install npm deps
        run: npm install --ignore-scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Generate npm/<triple> dirs, then place each .node into its package.
      - name: Prepare per-platform packages
        run: |
          napi create-npm-dirs
          napi artifacts --output-dir artifacts

      # Sync root package.json version to the pushed tag (strip leading 'v').
      # This ensures `npm publish` reports the correct version and matches the
      # GitHub Release tag. --no-git-tag-version prevents a second git tag.
      - name: Sync package.json version to tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Rewrite the root package's optionalDependencies to the tag version and
      # copy the addons into npm/<triple>/, WITHOUT publishing anything.
      - name: Rewrite optionalDependencies (no publish)
        run: napi pre-publish -t npm --skip-optional-publish

      # Pack each per-platform sub-package and the root package into .tgz.
      # npm pack does NOT run the prepublishOnly hook, so this never publishes.
      - name: Pack tarballs
        run: |
          mkdir -p dist
          for d in npm/*/; do
            npm pack "./$d" --pack-destination dist
          done
          npm pack . --pack-destination dist
          ls -la dist

      # Create the Release (or upload to it if it already exists, e.g. re-run).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tgz --clobber
          else
            gh release create "$TAG" dist/*.tgz --generate-notes --title "$TAG"
          fi
